name: Generate Rumbo

on:
#  schedule:
#    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      run_gemini_test:
        description: 'Run parallel Gemini Flash test'
        type: boolean
        default: false

permissions:
  contents: write

jobs:  
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SEND_NEWSLETTER: ${{ vars.SEND_NEWSLETTER }}
          RUN_GEMINI_TEST: ${{ inputs.run_gemini_test }}
        run: node generate.js

      - name: Commit and push
        run: |
          git config user.name "rumbo-bot"
          git config user.email "bot@rumbo.wtf"
          git add index.html index-es.html index-no.html index-uk.html index-nl.html all_output.json last_output.json recent_headlines.json
          git add gemini-comparison-*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily update $(date -u +%Y-%m-%d)"
          git push --force
