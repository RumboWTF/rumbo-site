name: Generate Rumbo

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:  
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.js --region=es

      - name: Commit and push
        run: |
          git config user.name "rumbo-bot"
          git config user.email "bot@rumbo.wtf"
          git add index.html index-es.html index-no.html index-uk.html index-nl.html
          git diff --staged --quiet || git commit -m "Daily update $(date -u +%Y-%m-%d)"
          git stash
          git pull --rebase origin main
          git stash pop
          git push
